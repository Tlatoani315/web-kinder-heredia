<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Iniciar sesión — Panel Administrativo</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;700;800;900&display=swap" rel="stylesheet" />

  <style>
    /* ── Variables institucionales ── */
    :root {
      --azul:        #1A4B8C;
      --azul-oscuro: #0f2e5a;
      --azul-claro:  #dde8f8;
      --amarillo:    #F5C518;
      --verde:       #2E9E5B;
      --blanco:      #ffffff;
      --gris-fondo:  #f0f4fb;
      --gris-texto:  #4a5568;
      --gris-borde:  #cbd5e0;
      --error-color: #e53e3e;
      --error-bg:    #fff5f5;
      --fuente-titulo: 'Nunito', sans-serif;
      --fuente-texto:  'Open Sans', sans-serif;
      --transicion:  0.22s ease;
      --radio:       10px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--fuente-texto);
      background: var(--gris-fondo);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      /* Fondo decorativo con gradiente institucional */
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(26,75,140,.12) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(46,158,91,.10) 0%, transparent 55%);
    }

    /* ── Tarjeta de login ── */
    .login-card {
      background: var(--blanco);
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(26,75,140,.18), 0 4px 16px rgba(0,0,0,.08);
      width: 100%;
      max-width: 420px;
      overflow: hidden;
    }

    /* Header de la tarjeta */
    .login-card__header {
      background: linear-gradient(135deg, var(--azul) 0%, var(--azul-oscuro) 100%);
      padding: 36px 32px 30px;
      text-align: center;
      position: relative;
    }

    .login-card__logo-img {
      width: 68px;
      height: 68px;
      border-radius: 16px;
      display: block;
      margin: 0 auto 16px;
      border: 2px solid rgba(255,255,255,.2);
      background: rgba(255,255,255,.1);
      padding: 6px;
      object-fit: contain;
    }

    .login-card__school {
      font-family: var(--fuente-titulo);
      font-size: .78rem;
      font-weight: 700;
      color: rgba(255,255,255,.7);
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-bottom: 6px;
    }

    .login-card__title {
      font-family: var(--fuente-titulo);
      font-size: 1.35rem;
      font-weight: 800;
      color: var(--blanco);
      line-height: 1.3;
    }

    .login-card__subtitle {
      font-size: .82rem;
      color: rgba(255,255,255,.65);
      margin-top: 6px;
    }

    /* Cuerpo del formulario */
    .login-card__body {
      padding: 32px;
    }

    /* Alerta de error */
    .login-alert {
      display: none;
      align-items: flex-start;
      gap: 10px;
      background: var(--error-bg);
      border: 1.5px solid #feb2b2;
      border-radius: var(--radio);
      padding: 12px 14px;
      margin-bottom: 22px;
      font-size: .88rem;
      color: var(--error-color);
      line-height: 1.5;
    }
    .login-alert--visible { display: flex; }
    .login-alert__icon { font-size: 1.1rem; flex-shrink: 0; margin-top: 1px; }

    /* Grupos de campo */
    .form-group {
      margin-bottom: 18px;
    }

    .form-label {
      display: block;
      font-family: var(--fuente-titulo);
      font-weight: 700;
      font-size: .85rem;
      color: var(--azul);
      margin-bottom: 7px;
    }

    .form-input-wrap {
      position: relative;
    }

    .form-input-icon {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1rem;
      pointer-events: none;
      color: var(--gris-texto);
    }

    .form-input {
      width: 100%;
      padding: 12px 42px 12px 40px;
      border: 1.5px solid var(--gris-borde);
      border-radius: var(--radio);
      font-family: var(--fuente-texto);
      font-size: .95rem;
      color: #2d3748;
      background: var(--blanco);
      transition: border-color var(--transicion), box-shadow var(--transicion);
    }

    .form-input:focus {
      outline: none;
      border-color: var(--azul);
      box-shadow: 0 0 0 3px rgba(26,75,140,.18);
    }

    .form-input--error { border-color: var(--error-color) !important; }

    /* Botón mostrar/ocultar contraseña */
    .toggle-pass {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      color: var(--gris-texto);
      padding: 4px;
      border-radius: 4px;
      transition: color var(--transicion);
    }
    .toggle-pass:hover { color: var(--azul); }
    .toggle-pass:focus-visible { outline: 2px solid var(--azul); }

    /* Botón enviar */
    .btn-login {
      width: 100%;
      padding: 14px;
      background: var(--azul);
      color: var(--blanco);
      font-family: var(--fuente-titulo);
      font-size: 1rem;
      font-weight: 800;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: background var(--transicion), transform var(--transicion),
                  box-shadow var(--transicion);
      margin-top: 8px;
      letter-spacing: .02em;
    }

    .btn-login:hover {
      background: var(--azul-oscuro);
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(26,75,140,.35);
    }

    .btn-login:focus-visible {
      outline: 3px solid var(--amarillo);
      outline-offset: 3px;
    }

    .btn-login:disabled {
      opacity: .65;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    /* Spinner dentro del botón */
    .btn-login__spinner {
      display: none;
      width: 16px;
      height: 16px;
      border: 2.5px solid rgba(255,255,255,.4);
      border-top-color: var(--blanco);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    .btn-login--loading .btn-login__spinner { display: inline-block; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Enlace volver al sitio */
    .login-card__footer {
      text-align: center;
      padding: 0 32px 28px;
    }

    .login-back-link {
      font-size: .83rem;
      color: var(--gris-texto);
      text-decoration: none;
      font-family: var(--fuente-titulo);
      font-weight: 600;
      transition: color var(--transicion);
    }

    .login-back-link:hover { color: var(--azul); }

    /* Badge SEP */
    .login-card__badge {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 20px;
      font-size: .73rem;
      color: rgba(255,255,255,.5);
      font-family: var(--fuente-titulo);
      font-weight: 600;
    }

    /* Responsive */
    @media (max-width: 480px) {
      .login-card__header { padding: 28px 24px 22px; }
      .login-card__body   { padding: 24px; }
      .login-card__footer { padding: 0 24px 24px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { transition-duration: 0.01ms !important; animation-duration: 0.01ms !important; }
    }
  </style>
</head>
<body>

  <main>
    <div class="login-card" role="main">

      <!-- Cabecera institucional -->
      <div class="login-card__header">
        <img src="img/logo.svg" alt="Logotipo del Jardín de Niños" class="login-card__logo-img" />
        <p class="login-card__school">Jardín de Niños José María Heredia y Heredia</p>
        <h1 class="login-card__title">Panel Administrativo</h1>
        <p class="login-card__subtitle">Acceso exclusivo para personal autorizado</p>
        <div class="login-card__badge" aria-hidden="true">
          <span>🔒</span> SEP · Tecámac, Estado de México
        </div>
      </div>

      <!-- Formulario -->
      <div class="login-card__body">

        <!-- Alerta de error -->
        <div
          class="login-alert"
          id="loginAlert"
          role="alert"
          aria-live="assertive"
          aria-atomic="true"
        >
          <span class="login-alert__icon">⚠️</span>
          <span id="loginAlertMsg">Credenciales incorrectas.</span>
        </div>

        <form id="loginForm" novalidate aria-label="Formulario de inicio de sesión">

          <!-- Usuario -->
          <div class="form-group">
            <label for="usuario" class="form-label">Usuario</label>
            <div class="form-input-wrap">
              <span class="form-input-icon" aria-hidden="true">👤</span>
              <input
                type="text"
                id="usuario"
                name="usuario"
                class="form-input"
                placeholder="Nombre de usuario"
                autocomplete="username"
                required
                aria-required="true"
                aria-describedby="loginAlert"
                spellcheck="false"
              />
            </div>
          </div>

          <!-- Contraseña -->
          <div class="form-group">
            <label for="password" class="form-label">Contraseña</label>
            <div class="form-input-wrap">
              <span class="form-input-icon" aria-hidden="true">🔑</span>
              <input
                type="password"
                id="password"
                name="password"
                class="form-input"
                placeholder="••••••••"
                autocomplete="current-password"
                required
                aria-required="true"
              />
              <button
                type="button"
                class="toggle-pass"
                id="togglePass"
                aria-label="Mostrar contraseña"
                aria-pressed="false"
              >👁️</button>
            </div>
          </div>

          <!-- Botón -->
          <button type="submit" class="btn-login" id="loginBtn">
            <span class="btn-login__spinner" aria-hidden="true"></span>
            <span id="loginBtnText">Iniciar sesión</span>
          </button>

        </form>
      </div>

      <!-- Pie -->
      <div class="login-card__footer">
        <a href="/" class="login-back-link">← Volver al sitio público</a>
      </div>

    </div>
  </main>

  <script>
    'use strict';

    /* ── Elementos ── */
    const form       = document.getElementById('loginForm');
    const usuarioEl  = document.getElementById('usuario');
    const passwordEl = document.getElementById('password');
    const toggleBtn  = document.getElementById('togglePass');
    const loginBtn   = document.getElementById('loginBtn');
    const loginBtnTxt = document.getElementById('loginBtnText');
    const alertBox   = document.getElementById('loginAlert');
    const alertMsg   = document.getElementById('loginAlertMsg');

    /* ── Leer el parámetro returnTo para redirigir después del login ── */
    const params   = new URLSearchParams(window.location.search);
    const returnTo = params.get('returnTo') || '/admin';

    /* ── Si ya hay sesión activa, redirigir directamente ── */
    (async function checkSession() {
      try {
        const res = await fetch('/api/auth/verificar', { credentials: 'same-origin' });
        if (res.ok) {
          window.location.replace(returnTo);
        }
      } catch {
        /* sin sesión — mostrar formulario normalmente */
      }
    })();

    /* ── Mostrar / ocultar contraseña ── */
    toggleBtn.addEventListener('click', () => {
      const visible = passwordEl.type === 'text';
      passwordEl.type     = visible ? 'password' : 'text';
      toggleBtn.textContent = visible ? '👁️' : '🙈';
      toggleBtn.setAttribute('aria-label', visible ? 'Mostrar contraseña' : 'Ocultar contraseña');
      toggleBtn.setAttribute('aria-pressed', String(!visible));
    });

    /* ── Limpiar errores al escribir ── */
    [usuarioEl, passwordEl].forEach(el => {
      el.addEventListener('input', () => {
        el.classList.remove('form-input--error');
        hideAlert();
      });
    });

    function showAlert(msg) {
      alertMsg.textContent = msg;
      alertBox.classList.add('login-alert--visible');
    }

    function hideAlert() {
      alertBox.classList.remove('login-alert--visible');
    }

    function setLoading(loading) {
      loginBtn.disabled = loading;
      loginBtn.classList.toggle('btn-login--loading', loading);
      loginBtnTxt.textContent = loading ? 'Verificando…' : 'Iniciar sesión';
    }

    /* ── Envío del formulario ── */
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideAlert();

      const usuario  = usuarioEl.value.trim();
      const password = passwordEl.value;

      /* Validación local básica */
      if (!usuario) {
        usuarioEl.classList.add('form-input--error');
        usuarioEl.focus();
        showAlert('Escribe tu nombre de usuario.');
        return;
      }
      if (!password) {
        passwordEl.classList.add('form-input--error');
        passwordEl.focus();
        showAlert('Escribe tu contraseña.');
        return;
      }

      setLoading(true);

      try {
        const res = await fetch('/api/auth/login', {
          method:      'POST',
          headers:     { 'Content-Type': 'application/json' },
          credentials: 'same-origin',          // enviar y recibir cookies
          body:        JSON.stringify({ usuario, password }),
        });

        const data = await res.json();

        if (res.ok && data.ok) {
          /* Éxito — la cookie ya fue emitida por el servidor */
          loginBtnTxt.textContent = '✅ Acceso concedido…';
          setTimeout(() => window.location.replace(returnTo), 400);
        } else {
          /* Error de credenciales */
          [usuarioEl, passwordEl].forEach(el => el.classList.add('form-input--error'));
          showAlert(data.error || 'Credenciales incorrectas. Intenta de nuevo.');
          passwordEl.value = '';
          passwordEl.focus();
          setLoading(false);
        }
      } catch {
        showAlert('No se pudo conectar con el servidor. Verifica tu conexión.');
        setLoading(false);
      }
    });
  </script>
</body>
</html>
